# Sveltia CMS configuration (Decap-compatible).
# Docs: https://github.com/sveltia/sveltia-cms

backend:
  name: github
  repo: geetanshu-m/geetanshu-m.github.io
  branch: master
  # URL of your deployed OAuth relay (sveltia-cms-auth Cloudflare Worker).
  # Replace after deploying it — see docs/SVELTIA_SETUP.md.
  base_url: https://REPLACE-WITH-YOUR-OAUTH-WORKER.workers.dev

# Where uploaded images are stored / served from.
media_folder: static/uploads
public_folder: /uploads

# Local editing without GitHub login: run `npx decap-server` (port 8081)
# alongside `npm run dev`, then open /admin/. Re-comment before deploying.
# local_backend: true

collections:
  # ---- Site settings (identity, links, nav) ----
  - name: settings
    label: Settings
    files:
      - name: site
        label: Site & profile
        file: data/settings.json
        fields:
          - { name: title, label: Browser/SEO title, widget: string }
          - { name: author, label: Name, widget: string }
          - { name: position, label: Headline / role, widget: string }
          - { name: location, label: Location, widget: string }
          - { name: headerTitle, label: Header title, widget: string }
          - { name: slogan, label: Slogan, widget: string }
          - { name: description, label: Meta description, widget: text }
          - { name: email, label: Email, widget: string }
          - { name: resume, label: Résumé URL, widget: string, required: false }
          - { name: github, label: GitHub URL, widget: string, required: false }
          - { name: githubUser, label: GitHub username, widget: string, required: false }
          - { name: linkedin, label: LinkedIn URL, widget: string, required: false }
          - { name: medium, label: Medium URL, widget: string, required: false }
          - { name: youtube, label: YouTube URL, widget: string, required: false }
          - { name: twitter, label: Twitter URL, widget: string, required: false }
          - { name: twitter_user, label: Twitter handle, widget: string, required: false }
          - { name: stackoverflow, label: Stack Overflow URL, widget: string, required: false }
          - { name: siteUrl, label: Site URL, widget: string, required: false }
          - { name: siteRepo, label: Repo URL, widget: string, required: false }
          - { name: author_image, label: Author image path, widget: string, required: false }
          - { name: siteLogo, label: Site logo path, widget: string, required: false }
          - { name: image, label: Image path, widget: string, required: false }
          - { name: socialBanner, label: Social banner path, widget: string, required: false }
          - { name: language, label: Language, widget: string, required: false }
          - { name: theme, label: Theme, widget: string, required: false }
          - name: menu
            label: Navigation
            label_singular: Link
            widget: list
            summary: "{{fields.name}} → {{fields.path}}"
            fields:
              - { name: name, label: Label, widget: string }
              - { name: path, label: Path, widget: string }
              - { name: prefix, label: Prefix, widget: string, required: false, default: "" }

  # ---- About / intro ----
  - name: about
    label: About
    files:
      - name: intro
        label: Intro
        file: data/authorIntro.json
        fields:
          - { name: headline, label: Headline, widget: string }
          - name: introduction
            label: Introduction paragraphs
            widget: list
            field: { name: paragraph, label: Paragraph, widget: text }

  # ---- Experience timeline ----
  - name: experience
    label: Experience
    files:
      - name: timeline
        label: Timeline
        file: data/experience.json
        fields:
          - name: items
            label: Roles
            label_singular: Role
            widget: list
            summary: "{{fields.role}} · {{fields.org}}"
            fields:
              - { name: role, label: Role, widget: string }
              - { name: org, label: Organization, widget: string }
              - { name: period, label: Period, widget: string }
              - { name: current, label: Current role?, widget: boolean, default: false }
              - { name: summary, label: Summary, widget: text, required: false }
              - name: highlights
                label: Highlights
                widget: list
                required: false
                field: { name: point, label: Point, widget: text }

  # ---- Projects ----
  - name: projects
    label: Projects
    files:
      - name: list
        label: Project list
        file: data/projects.json
        fields:
          - name: items
            label: Projects
            label_singular: Project
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { name: title, label: Title, widget: string }
              - { name: description, label: Description, widget: text }
              - { name: href, label: Live URL, widget: string, default: "#", required: false }
              - { name: github, label: GitHub URL, widget: string, default: "#", required: false }
              - { name: tech1, label: Tech 1, widget: string, required: false }
              - { name: tech2, label: Tech 2, widget: string, required: false }
              - { name: tech3, label: Tech 3, widget: string, required: false }

  # ---- Writing (Medium) ----
  - name: writing
    label: Writing
    files:
      - name: articles
        label: Medium articles
        file: data/mediumArticles.json
        fields:
          - name: items
            label: Articles
            label_singular: Article
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { name: title, label: Title, widget: string }
              - { name: description, label: Description, widget: text }
              - { name: url, label: URL, widget: string }
              - { name: publication, label: Publication, widget: string, required: false }
              - { name: date, label: Date, widget: string, required: false }
              - name: tags
                label: Tags
                widget: list
                required: false
                field: { name: tag, label: Tag, widget: string }
